# Database Configuration
# Edit this file to enable/disable sources and configure access credentials.
#
# Fields:
#   enabled: set to true to include this source in the pipeline
#   args:    constructor arguments passed to the parser
#            (use *_env suffix to read a value from an environment variable)
#   notes:   description of the data source

databases:

  # Core sources (direct integration)
  aopdb:
    enabled: true
    args:
      mysql_config:
        host: "localhost"
        user_env: MYSQL_USERNAME
        password_env: MYSQL_PASSWORD
        database_env: MYSQL_DB_NAME
    notes: "Adverse Outcome Pathway Database. Provides Pathway nodes and geneInPathway/pathwayContainsGene edges. Requires local MySQL."

  disgenet:
    enabled: true
    args:
      api_key_env: DISGENET_API_KEY
      base_url: "https://www.disgenet.org/api"
    notes: "Gene-disease associations via REST API. Provides geneAssociatesWithDisease edges. Queries disease terms from project.yaml."

  drugbank:
    enabled: true
    args:
      username_env: DRUGBANK_USERNAME
      password_env: DRUGBANK_PASSWORD
    notes: "Drug information and drug-gene binding. Provides Drug nodes and chemicalBindsGene edges. Requires authentication."

  ncbigene:
    enabled: true
    args: {}
    notes: "Gene nodes from NCBI FTP. Disease-agnostic; provides the base Gene node set."

  dorothea:
    enabled: true
    args: {}
    notes: "Transcription factor regulatory network from OmniPath API. Provides TranscriptionFactor nodes and transcriptionFactorInteractsWithGene edges."

  disease_ontology:
    enabled: true
    args: {}
    notes: "Disease Ontology slim terms (137 curated diseases). Provides Disease nodes."

  gene_ontology:
    enabled: true
    args: {}
    notes: "GO terms and gene annotations. Provides BiologicalProcess, MolecularFunction, CellularComponent nodes and geneParticipatesInBiologicalProcess, geneHasMolecularFunction, geneAssociatedWithCellularComponent edges."

  uberon:
    enabled: true
    args: {}
    notes: "Uberon anatomy ontology. Provides BodyPart nodes."

  mesh:
    enabled: true
    args: {}
    notes: "MeSH Signs and Symptoms descriptors (C23.888 subtree). Provides Symptom nodes. Update MESH_YEAR in src/parsers/mesh_parser.py each January."

  gwas:
    enabled: false
    args: {}
    notes: "GWAS Catalog. Provides geneAssociatesWithDisease edges."

  drugcentral:
    enabled: true
    args: {}
    notes: "Drug-disease and drug class data from PostgreSQL. Provides DrugClass nodes and drugTreatsDisease, drugInClass edges. Load dump first: gunzip -c drugcentral.sql.gz | psql drugcentral"

  bindingdb:
    enabled: false
    args: {}
    notes: "Drug-gene binding affinities. Provides chemicalBindsGene edges."

  bgee:
    enabled: false
    args: {}
    notes: "Differential gene expression by anatomy. Provides anatomyUpregulatesGene and anatomyDownregulatesGene edges."

  ctd:
    enabled: false
    args: {}
    notes: "Comparative Toxicogenomics Database. Provides Chemical nodes and chemicalIncreasesExpression, chemicalDecreasesExpression, chemicalAssociatesWithDisease edges."

  pubtator:
    enabled: false
    args: {}
    notes: "PubTator Central literature co-occurrence mining."

  medline_cooccurrence:
    enabled: true
    args: {}
    notes: "MEDLINE co-occurrence. Provides symptomManifestationOfDisease, diseaseLocalizesToAnatomy, and diseaseAssociatesWithDisease edges."
