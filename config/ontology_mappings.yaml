# KG Ontology Mapping Configuration
# This file defines how extracted data maps to ontology nodes and relationships.
#
# Config keys use format: {source_name}.{data_name}
# Property names are strings resolved to ontology objects at runtime by the populator.
#
# data_type: "node" or "relationship"
# For nodes: node_type, source_filename, parse_config (iri_column_name, data_property_map, merge_column)
# For relationships: relationship_type, inverse_relationship_type, source_filename, parse_config
#   (subject_node_type, subject_column_name, subject_match_property,
#    object_node_type, object_column_name, object_match_property)

mappings:

  # ===========================================================================
  # AOP-DB - Adverse Outcome Pathway Database
  # ===========================================================================
  aopdb.drugs:
    data_type: node
    node_type: Drug
    source_filename: drugs.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: DTX_id
      data_property_map:
        ChemicalID: xrefMeSH
        source_database: sourceDatabase
      merge_column:
        source_column_name: DTX_id
        data_property: xrefDTXSID

  aopdb.pathways:
    data_type: node
    node_type: Pathway
    source_filename: pathways.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: path_name
      data_property_map:
        path_id: pathwayId
        path_name: pathwayName
        ext_source: sourceDatabase
        source_database: sourceDatabase

  aopdb.gene_pathway_relationships:
    data_type: relationship
    relationship_type: geneInPathway
    inverse_relationship_type: pathwayContainsGene
    source_filename: gene_pathway_relationships.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: Gene
      subject_column_name: entrez
      subject_match_property: xrefNcbiGene
      object_node_type: Pathway
      object_column_name: path_name
      object_match_property: pathwayName

  # ===========================================================================
  # DisGeNET - Gene-Disease Associations
  # ===========================================================================
  disgenet.disease_classifications:
    data_type: node
    node_type: Disease
    source_filename: disease_classifications.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: diseaseId
      data_property_map:
        diseaseId: xrefUmlsCUI
        diseaseName: commonName
        sourceDatabase: sourceDatabase

  disgenet.disease_mappings:
    data_type: node
    node_type: Disease
    source_filename: disease_mappings.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: diseaseId
      filter_column: DO
      filter_value: "0"
      merge_column:
        source_column_name: diseaseId
        data_property: xrefUmlsCUI
        sourceDatabase: sourceDatabase
      data_property_map:
        DO: xrefDiseaseOntology

  disgenet.gene_disease_associations:
    data_type: relationship
    relationship_type: geneAssociatesWithDisease
    source_filename: gene_disease_associations.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: Gene
      subject_column_name: geneSymbol
      subject_match_property: geneSymbol
      object_node_type: Disease
      object_column_name: diseaseId
      object_match_property: xrefUmlsCUI
      filter_column: diseaseType
      filter_value: disease

  # ===========================================================================
  # DrugBank - Drug Information
  # ===========================================================================
  drugbank.drugs:
    data_type: node
    node_type: Drug
    source_filename: drugs.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: drugbank_id
      data_property_map:
        drugbank_id: xrefDrugbank
        cas_number: xrefCasRN
        drug_name: commonName
        source_database: sourceDatabase
      merge_column:
        source_column_name: cas_number
        data_property: xrefCasRN

  drugbank.compound_nodes:
    data_type: node
    node_type: Drug
    source_filename: compound_nodes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: drugbank_id
      data_property_map:
        drugbank_id: xrefDrugbank
        name: commonName
        type: drugType
        inchikey: inchiKey
        sourceDatabase: sourceDatabase

  drugbank.drug_binds_gene:
    data_type: relationship
    relationship_type: compoundBindsGene
    source_filename: drug_binds_gene.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: Drug
      subject_column_name: drugbank_id
      subject_match_property: xrefDrugbank
      object_node_type: Gene
      object_column_name: entrez_gene_id
      object_match_property: xrefNcbiGene

  # ===========================================================================
  # NCBI Gene - Gene Information
  # ===========================================================================
  ncbigene.genes:
    data_type: node
    node_type: Gene
    source_filename: genes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: Symbol
      compound_fields:
        dbXrefs:
          delimiter: "|"
          field_split_prefix: ":"
      data_property_map:
        GeneID: xrefNcbiGene
        Symbol: geneSymbol
        type_of_gene: typeOfGene
        Full_name_from_nomenclature_authority: commonName
        xref_MIM: xrefOMIM
        xref_HGNC: xrefHGNC
        xref_Ensembl: xrefEnsembl
        chromosome: chromosome
        source_database: sourceDatabase

  # ===========================================================================
  # DoRothEA - Transcription Factor Regulatory Network
  # ===========================================================================
  dorothea.transcription_factors:
    data_type: node
    node_type: TranscriptionFactor
    source_filename: transcription_factors.tsv
    merge: true
    skip: false
    parse_config:
      headers: true
      iri_column_name: tf_symbol
      data_property_map:
        tf_symbol: TF
        source_database: sourceDatabase

  dorothea.tf_gene_interactions:
    data_type: relationship
    relationship_type: transcriptionFactorInteractsWithGene
    source_filename: tf_gene_interactions.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: TranscriptionFactor
      subject_column_name: tf_symbol
      subject_match_property: TF
      object_node_type: Gene
      object_column_name: target_gene
      object_match_property: geneSymbol

  # ===========================================================================
  # SIDER - Side Effect Nodes and Compound-causes-SideEffect Edges
  # No parser implemented yet — placeholder for future integration
  # ===========================================================================
  sider.side_effect_nodes:
    data_type: node
    node_type: SideEffect
    source_filename: side_effect_nodes.tsv
    merge: false
    skip: true
    parse_config:
      headers: true
      iri_column_name: umls_cui
      data_property_map:
        umls_cui: xrefUmlsCUI
        name: commonName
        source: sourceDatabase

  sider.compound_causes_side_effect:
    data_type: relationship
    relationship_type: compoundCausesSideEffect
    source_filename: compound_causes_side_effect.tsv
    merge: false
    skip: true
    parse_config:
      headers: true
      subject_node_type: Drug
      subject_column_name: drugbank_id
      subject_match_property: xrefDrugbank
      object_node_type: SideEffect
      object_column_name: umls_cui
      object_match_property: xrefUmlsCUI

  # ===========================================================================
  # LINCS L1000 - Expression Edges
  # No parser implemented yet — placeholder for future integration
  # ===========================================================================
  lincs.compound_upregulates_gene:
    data_type: relationship
    relationship_type: compoundUpregulatesGene
    source_filename: compound_upregulates_gene.tsv
    merge: false
    skip: true
    parse_config:
      headers: true
      subject_node_type: Drug
      subject_column_name: drugbank_id
      subject_match_property: xrefDrugbank
      object_node_type: Gene
      object_column_name: entrez_gene_id
      object_match_property: xrefNcbiGene

  lincs.compound_downregulates_gene:
    data_type: relationship
    relationship_type: compoundDownregulatesGene
    source_filename: compound_downregulates_gene.tsv
    merge: false
    skip: true
    parse_config:
      headers: true
      subject_node_type: Drug
      subject_column_name: drugbank_id
      subject_match_property: xrefDrugbank
      object_node_type: Gene
      object_column_name: entrez_gene_id
      object_match_property: xrefNcbiGene

  lincs.gene_regulates_gene:
    data_type: relationship
    relationship_type: geneRegulatesGene
    source_filename: gene_regulates_gene.tsv
    merge: false
    skip: true
    parse_config:
      headers: true
      subject_node_type: Gene
      subject_column_name: source_gene
      subject_match_property: xrefNcbiGene
      object_node_type: Gene
      object_column_name: target_gene
      object_match_property: xrefNcbiGene

  # ===========================================================================
  # MEDLINE Co-occurrence - Literature-mined Edges
  # ===========================================================================
  medline.disease_symptom_cooccurrence:
    data_type: relationship
    relationship_type: diseasePresentsSymptom
    source_filename: disease_symptom_cooccurrence.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: Disease
      subject_column_name: doid_code
      subject_match_property: xrefDiseaseOntology
      object_node_type: Symptom
      object_column_name: mesh_id
      object_match_property: xrefMeSH

  medline.disease_anatomy_cooccurrence:
    data_type: relationship
    relationship_type: diseaseLocalizesToAnatomy
    source_filename: disease_anatomy_cooccurrence.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: Disease
      subject_column_name: doid_code
      subject_match_property: xrefDiseaseOntology
      object_node_type: BodyPart
      object_column_name: uberon_id
      object_match_property: xrefUberon

  medline.disease_disease_cooccurrence:
    data_type: relationship
    relationship_type: diseaseResemblesDisease
    source_filename: disease_disease_cooccurrence.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: Disease
      subject_column_name: doid_code_0
      subject_match_property: xrefDiseaseOntology
      object_node_type: Disease
      object_column_name: doid_code_1
      object_match_property: xrefDiseaseOntology

  # ===========================================================================
  # DrugCentral - Pharmacologic Classes
  # ===========================================================================
  drugcentral.pharmacologic_classes:
    data_type: node
    node_type: PharmacologicClass
    source_filename: pharmacologic_classes.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: class_id
      data_property_map:
        class_id: classId
        class_name: commonName
        class_type: classType
        source: sourceDatabase

  drugcentral.pharmacologic_class_includes_compound:
    data_type: relationship
    relationship_type: pharmacologicClassIncludesCompound
    inverse_relationship_type: compoundInPharmacologicClass
    source_filename: pharmacologic_class_includes_compound.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: PharmacologicClass
      subject_column_name: class_id
      subject_match_property: classId
      object_node_type: Drug
      object_column_name: drugbank_id
      object_match_property: xrefDrugbank

  # ===========================================================================
  # PharmacotherapyDB - Drug Indications (CtD, CpD)
  # No parser implemented yet — placeholder for future integration
  # ===========================================================================
  pharmacotherapydb.compound_treats_disease:
    data_type: relationship
    relationship_type: compoundTreatsDisease
    source_filename: compound_treats_disease.tsv
    merge: false
    skip: true
    parse_config:
      headers: true
      subject_node_type: Drug
      subject_column_name: drugbank_id
      subject_match_property: xrefDrugbank
      object_node_type: Disease
      object_column_name: doid_id
      object_match_property: xrefDiseaseOntology

  pharmacotherapydb.compound_palliates_disease:
    data_type: relationship
    relationship_type: compoundPalliatesDisease
    source_filename: compound_palliates_disease.tsv
    merge: false
    skip: true
    parse_config:
      headers: true
      subject_node_type: Drug
      subject_column_name: drugbank_id
      subject_match_property: xrefDrugbank
      object_node_type: Disease
      object_column_name: doid_id
      object_match_property: xrefDiseaseOntology

  # ===========================================================================
  # Disease Ontology - Slim Terms (137 curated diseases)
  # ===========================================================================
  disease_ontology.slim_terms:
    data_type: node
    node_type: Disease
    source_filename: slim_terms.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: doid
      data_property_map:
        doid: xrefDiseaseOntology
        name: commonName
        pathophysiology: pathophysiology
        sourceDatabase: sourceDatabase

  # ===========================================================================
  # Bgee - Differential Gene Expression by Anatomy
  # ===========================================================================
  bgee.anatomy_upregulates_gene:
    data_type: relationship
    relationship_type: anatomyUpregulatesGene
    source_filename: anatomy_upregulates_gene.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: BodyPart
      subject_column_name: uberon_id
      subject_match_property: xrefUberon
      object_node_type: Gene
      object_column_name: entrez_gene_id
      object_match_property: xrefNcbiGene

  bgee.anatomy_downregulates_gene:
    data_type: relationship
    relationship_type: anatomyDownregulatesGene
    source_filename: anatomy_downregulates_gene.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      subject_node_type: BodyPart
      subject_column_name: uberon_id
      subject_match_property: xrefUberon
      object_node_type: Gene
      object_column_name: entrez_gene_id
      object_match_property: xrefNcbiGene

  # ===========================================================================
  # Hetionet Precomputed - Gene-Gene Relationships
  # No parser implemented yet — placeholder for future integration
  # ===========================================================================
  hetionet_precomputed.gene_interacts:
    data_type: relationship
    relationship_type: geneInteractsWithGene
    source_filename: gene_interacts.tsv
    merge: false
    skip: true
    parse_config:
      headers: true
      subject_node_type: Gene
      subject_column_name: gene_0
      subject_match_property: xrefNcbiGene
      object_node_type: Gene
      object_column_name: gene_1
      object_match_property: xrefNcbiGene

  hetionet_precomputed.gene_covaries:
    data_type: relationship
    relationship_type: geneCovariesWithGene
    source_filename: gene_covaries.tsv
    merge: false
    skip: true
    parse_config:
      headers: true
      subject_node_type: Gene
      subject_column_name: gene_0
      subject_match_property: xrefNcbiGene
      object_node_type: Gene
      object_column_name: gene_1
      object_match_property: xrefNcbiGene

  # ===========================================================================
  # Uberon - Hetio Slim (652 anatomies with MeSH cross-references)
  # ===========================================================================
  uberon.hetio_slim:
    data_type: node
    node_type: BodyPart
    source_filename: hetio_slim.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: uberon_id
      data_property_map:
        uberon_id: xrefUberon
        uberon_name: commonName
        mesh_id: xrefMeSH
        bto_id: xrefBTO
        sourceDatabase: sourceDatabase

  # ===========================================================================
  # MeSH - Hetio Symptoms (505 symptoms)
  # ===========================================================================
  mesh.hetio_symptoms:
    data_type: node
    node_type: Symptom
    source_filename: hetio_symptoms.tsv
    merge: false
    skip: false
    parse_config:
      headers: true
      iri_column_name: mesh_id
      data_property_map:
        mesh_id: xrefMeSH
        mesh_name: commonName
        in_hsdn: inHSDN
        sourceDatabase: sourceDatabase

  # ===========================================================================
  # Gene Ontology - Aggregated GO Annotations
  # ===========================================================================
  gene_ontology.go_annotations:
    data_type: relationship
    relationship_type: geneParticipatesInGOTerm
    source_filename: go_annotations.tsv
    merge: false
    skip: true  # Requires special aggregated parsing not yet implemented
    parse_config:
      headers: true
      subject_node_type: Gene
      subject_column_name: gene_ids
      subject_match_property: xrefNcbiGene
      object_node_type: BiologicalProcess
      object_column_name: go_id
      object_match_property: xrefGeneOntology
      aggregated_format: true
