# KG Project Configuration
# This file defines the disease scope and ontology settings for this knowledge graph.

project:
  name: "alzkb"
  display_name: "Alzheimer's Knowledge Base"
  version: "2.3.0"

  disease_scope:
    primary_terms:
      - "alzheimer"
    umls_cuis:
      - "C0002395"   # Alzheimer's Disease
      - "C0750901"   # Alzheimer's Disease, Late Onset
      - "C0750900"   # Alzheimer's Disease, Early Onset
    doid_ids:
      - "DOID:10652"  # Alzheimer's disease
    mesh_ids:
      - "D000544"     # Alzheimer Disease
    # drug_names:
    #   - "donepezil"
    #   - "rivastigmine"
    #   - "galantamine"
    #   - "memantine"
    #   - "aducanumab"
    #   - "lecanemab"
    #   - "tacrine"
    #   - "solanezumab"
    #   - "gantenerumab"
    #   - "donanemab"

  ontology:
    base_file: "data/ontology/alzkb_v2.rdf"
    namespace: "http://jdr.bio/ontologies/alzkb.owl"
    populated_output: "data/output/alzkb_v2_populated.rdf"

  graph_indexes:
    Gene: ["geneSymbol", "xrefNcbiGene"]
    Drug: ["commonName", "xrefDrugbank", "xrefDTXSID"]
    Disease: ["commonName", "xrefUmlsCUI", "xrefDiseaseOntology"]
    Pathway: ["pathwayName"]
    BodyPart: ["commonName", "xrefUberon"]
    Symptom: ["commonName", "xrefMeSH"]
    TranscriptionFactor: ["TF"]

  node_types:
    # Active: parsers exist and produce these node types
    - Gene
    - Drug
    - Chemical
    - Disease
    - Pathway
    - BiologicalProcess
    - MolecularFunction
    - CellularComponent
    - BodyPart
    - Symptom
    - TranscriptionFactor
    - DrugClass
    # Inactive: defined in ontology but no parser produces these yet
    # - AdverseEffect
    # - AnimalToxin
    # - Biotoxin
    # - CellType
    # - ChemicalConcept
    # - ChemicalEffect
    # - ChemicalList
    # - ClinicalPhenotype
    # - CopyNumberVariant
    # - Database
    # - EnvironmentalRiskFactor
    # - ExposureEvent
    # - Finding
    # - FungalToxin
    # - GainOfFunctionMutation
    # - GeneticDisease
    # - GeneticEntity
    # - GeneticPathway
    # - GeneticRiskFactor
    # - Human
    # - HumanConcept
    # - HumanMolecule
    # - HumanNucleicAcid
    # - HumanProtein
    # - HumanSmallMolecule
    # - List
    # - LossOfFunctionMutation
    # - MedicalCondition
    # - MetabolicPathway
    # - MicrobialToxin
    # - Mutation
    # - NonHumanSpecies
    # - Organ
    # - OrganSystem
    # - PharmaceuticalDrug
    # - PlantToxin
    # - Publication
    # - ResearchEntity
    # - RiskFactor
    # - SignalTransductionPathway
    # - SingleNucleotidePolymorphism
    # - Species
    # - Study
    # - SyntheticToxin
    # - TherapeuticEffect
    # - TissueType
    # - Toxin
    # - Variant
    # - VenomComponent

  edge_types:
    # Active: parsers exist and produce these edge types
    - geneAssociatesWithDisease
    - geneInPathway
    - geneInteractsWithGene
    - geneCovariesWithGene
    - geneRegulatesGene
    - geneParticipatesInBiologicalProcess
    - geneHasMolecularFunction
    - geneAssociatedWithCellularComponent
    - transcriptionFactorInteractsWithGene
    - drugTreatsDisease
    - chemicalAssociatesWithDisease
    - chemicalBindsGene
    - chemicalCausesEffect
    - chemicalIncreasesExpression
    - chemicalDecreasesExpression
    - anatomyUpregulatesGene
    - anatomyDownregulatesGene
    - symptomManifestationOfDisease
    - diseaseLocalizesToAnatomy
    - diseaseAssociatesWithDisease
    - drugInClass
    - pathwayContainsGene
